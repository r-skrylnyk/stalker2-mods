; =============================================================================
; S2GlobalConfig.ini
; =============================================================================
; Purpose:
;   Each Binding line copies GAME global variables into YOUR Blueprint variables.
;
; Where to put this file:
;   UE4SS/Mods/S2Global/dlls/S2GlobalConfig.ini  (next to the mod DLL)
;
; Binding lines:
;   Any key starting with "Binding" is used (Binding1, Binding2, etc).
;
; Format:
;   BindingX = <BP_Class_Substring> | <Global>:<BPVar>[:type], <Global>:<BPVar>[:type], ...
;	...more than one binding can be created just lable them Binding1, Binding2, Binding55, and so on. Does not have to be in numerical order. Just as long as Binding is the name followed by an number.
; Meaning:
;   - <BP_Class_Substring>: part of the target object’s FullName (usually your BP class like BP_MyMod_MWSS_C)
;   - <Global>: the game global variable name to read. Can be a custom global var set in GlobalVariablePrototypes.cfg
;   - <BPVar>: your Blueprint variable name to write
;   - type (optional): int (default) or bool. STRING IS NOT ALLOWED (at the moment)
;
; Example:
;   Binding1 = My_Mods_BluePrint | SomeGlobalVar:SomeBluePrintVar:int, GlobalVar2:BPVar:int
;	Binding32 = My_OtherModBP | MyGlobalVar:IsMyBpVar:bool
; Notes:
;   - Only bool or int is supported.
; =============================================================================

; Required bindings (one per line; keys starting with "Binding"). Just remove ; than add your binding.
;Binding1 = My_Mods_BluePrint | SomeGlobalVar:SomeBluePrintVar:int


; Optional debug toggles. Additional output text to console.
debug_enabled = true